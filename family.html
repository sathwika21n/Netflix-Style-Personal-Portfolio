<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Time | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <link rel="stylesheet" href="stalker.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">Childhood 📸</h1>
            <p class="stalker-hero-subtitle">Cherished moments with loved ones</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>  
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">My Fav People</h2>
            <p class="section-subtitle">More snapshots from family life</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="images/ammaChildhood.jpeg" alt="Family Picnic">
                    
                </div>
                
                <div class="memory-item">
                    <img src="images/nannaChildhood.jpeg" alt="Family Dinner">
                </div>
                
                <div class="memory-item">
                    <img src="images/bdayChildhood.jpeg" alt="Birthday Celebration">
                </div>
                
                <div class="memory-item">
                    <img src="images/playhouse.jpeg" alt="Holiday Gathering">
                </div>
                
                <div class="memory-item">
                    <img src="images/single.jpeg" alt="Temple Visit">
                </div>
                
                <div class="memory-item">
                    <img src="images/meNnimmi.jpeg" alt="Game Night">
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
