<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="stalker.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">Nature Gallery 🌅</h1>
            <p class="stalker-hero-subtitle">Peaceful moments in the great outdoors</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">Nature Moments</h2>
            <p class="section-subtitle">More serene natural experiences</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Mountain Sunrise">
                    <div class="memory-label">
                        <span class="memory-icon">🌄</span>
                        <p>Mountain Views</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" alt="Forest Path">
                    <div class="memory-label">
                        <span class="memory-icon">🌲</span>
                        <p>Forest Walks</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800" alt="Ocean Sunset">
                    <div class="memory-label">
                        <span class="memory-icon">🌅</span>
                        <p>Ocean Sunsets</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800" alt="Lake Reflection">
                    <div class="memory-label">
                        <span class="memory-icon">🏞️</span>
                        <p>Lake Reflections</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800" alt="Wildflowers">
                    <div class="memory-label">
                        <span class="memory-icon">🌸</span>
                        <p>Wildflower Fields</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800" alt="Starry Night">
                    <div class="memory-icon">🌌</span>
                        <p>Starry Nights</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
