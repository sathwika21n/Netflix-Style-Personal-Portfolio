<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <link rel="stylesheet" href="stalker.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">Nature Gallery 🌅</h1>
            <p class="stalker-hero-subtitle">Peaceful moments in the great outdoors</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">Nature Moments</h2>
            <p class="section-subtitle">More serene natural experiences</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="images/goat1.jpeg" alt="Mountain Sunrise">
                </div>
                
                <div class="memory-item">
                    <img src="images/rainbow.jpeg" alt="Forest Path">
                </div>
                
                <div class="memory-item">
                    <img src="images/caves.jpeg" alt="Ocean Sunset">
                </div>
                
                <div class="memory-item">
                    <img src="images/goat2.jpeg" alt="Lake Reflection">
                </div>
                
                <div class="memory-item">
                    <img src="images/moka.jpeg" alt="Wildflowers">
                </div>
                
                <div class="memory-item">
                    <img src="images/mallards.jpeg" alt="Starry Night">
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
