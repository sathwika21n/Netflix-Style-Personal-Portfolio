<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrations | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="stalker.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">Celebrations Gallery 🎉</h1>
            <p class="stalker-hero-subtitle">Joyful moments and special occasions</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">Celebration Moments</h2>
            <p class="section-subtitle">More festive and happy times</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=800" alt="Birthday Party">
                    <div class="memory-label">
                        <span class="memory-icon">🎂</span>
                        <p>Birthday Bash</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800" alt="Graduation">
                    <div class="memory-label">
                        <span class="memory-icon">🎓</span>
                        <p>Graduation Day</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800" alt="Wedding">
                    <div class="memory-label">
                        <span class="memory-icon">💒</span>
                        <p>Wedding Joy</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=800" alt="New Year">
                    <div class="memory-label">
                        <span class="memory-icon">🎆</span>
                        <p>New Year Fest</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800" alt="Anniversary">
                    <div class="memory-label">
                        <span class="memory-icon">💍</span>
                        <p>Anniversaries</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800" alt="Holiday Party">
                    <div class="memory-icon">🎄</span>
                        <p>Holiday Parties</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
