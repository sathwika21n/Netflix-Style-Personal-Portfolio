<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Occasions | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <link rel="stylesheet" href="stalker.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">Special Occasions Gallery 🎂</h1>
            <p class="stalker-hero-subtitle">Memorable events and milestones</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">Special Moments</h2>
            <p class="section-subtitle">More milestone celebrations</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800" alt="Engagement">
                    <div class="memory-label">
                        <span class="memory-icon">💍</span>
                        <p>Engagement Party</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800" alt="Promotion">
                    <div class="memory-label">
                        <span class="memory-icon">🏆</span>
                        <p>Work Milestones</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=800" alt="Baby Shower">
                    <div class="memory-label">
                        <span class="memory-icon">👶</span>
                        <p>Baby Showers</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?w=800" alt="Retirement">
                    <div class="memory-label">
                        <span class="memory-icon">🎉</span>
                        <p>Retirement Party</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800" alt="Achievement">
                    <div class="memory-label">
                        <span class="memory-icon">🎓</span>
                        <p>Achievements</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=800" alt="Reunion">
                    <div class="memory-icon">👨‍👩‍👧‍👦</span>
                        <p>Family Reunions</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
