<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adventures | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <link rel="stylesheet" href="stalker.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">My People 🌍</h1>
            <p class="stalker-hero-subtitle">Connecting with loved ones</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">My Family</h2>
            <p class="section-subtitle"> Cherished moments with loved ones</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="images/ammiThothu.jpeg" alt="Mountain Hike">
                </div>
                
                <div class="memory-item">
                    <img src="images/familyDinner.jpg" alt="Ocean Voyage">
                </div>
                
                <div class="memory-item">
                    <img src="images/snowDay.jpeg" alt="Forest Exploration">
                </div>
                
                <div class="memory-item">
                    <img src="images/diwaliFamPic.jpg" alt="City Exploration">
                </div>
                
                <div class="memory-item">
                    <img src="images/templeFam.jpeg" alt="Camping Trip">
                </div>
                
                <div class="memory-item">
                    <img src="images/nannamaThatha.jpeg" alt="Road Trip">
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
