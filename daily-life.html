<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Life | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css?v=6">
    <link rel="stylesheet" href="stalker.css?v=4">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="stalker-body">
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <a href="stalker.html"><h1>Back to Stalker</h1></a>
            </div>
            <ul class="navbar-menu">
                <li><a href="#gallery">Gallery</a></li>
            </ul>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="stalker-hero">
        <div class="stalker-hero-content">
            <h1 class="stalker-hero-title">Daily Life Gallery ☕</h1>
            <p class="stalker-hero-subtitle">Everyday moments that matter</p>
            <button class="stalker-btn">Explore Gallery</button>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="memories">
        <div class="container">
            <h2 class="section-title">Daily Moments</h2>
            <p class="section-subtitle">More everyday experiences</p>
            
            <div class="memories-grid">
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800" alt="Morning Coffee">
                    <div class="memory-label">
                        <span class="memory-icon">☕</span>
                        <p>Morning Routine</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800" alt="Reading Time">
                    <div class="memory-label">
                        <span class="memory-icon">📖</span>
                        <p>Reading Hours</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800" alt="Cooking">
                    <div class="memory-label">
                        <span class="memory-icon">👩‍🍳</span>
                        <p>Cooking Adventures</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=800" alt="Work Space">
                    <div class="memory-label">
                        <span class="memory-icon">💻</span>
                        <p>Work From Home</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1481627834876-b7833e8f5570?w=800" alt="Evening Walk">
                    <div class="memory-label">
                        <span class="memory-icon">🌙</span>
                        <p>Evening Strolls</p>
                    </div>
                </div>
                
                <div class="memory-item">
                    <img src="https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=800" alt="Pet Time">
                    <div class="memory-icon">🐾</span>
                        <p>Pet Moments</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
