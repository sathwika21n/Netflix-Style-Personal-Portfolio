<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | Sathwika's Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Audio elements for the cinematic intro and profile selection -->
    <audio id="netflix-sound" preload="auto">
        <source src="netflix-sound.mp3" type="audio/mpeg">
        <source src="netflix-sound.ogg" type="audio/ogg">
        <source src="netflix-sound.wav" type="audio/wav">
    </audio>
    <audio id="profile-click-sound" preload="auto">
        <source src="profile-click.mp3" type="audio/mpeg">
    </audio>

    <!-- Cinematic Loading Screen -->
    <div id="loading-screen" class="loading-screen" aria-label="Portfolio opening animation">
        <div class="cinematic-vignette"></div>
        <div class="cinematic-beams" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="loading-logo" aria-hidden="true">
            <div class="cinematic-logo-mark">
                <span class="portfolio-initial">S</span>
            </div>
            <div class="logo-text">Portfolio</div>
        </div>
        <button class="intro-start-btn" type="button">Start Portfolio</button>
    </div>

    <!-- Who's Watching Section -->
    <section id="whoIsWatching" class="who-is-watching">
        <div class="watching-container">
            <h1 class="watching-title">Who's watching?</h1>
            <div class="profiles">
                <div class="profile" data-profile="developer">
                    <div class="profile-avatar" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <i class="fas fa-code"></i>
                    </div>
                    <p class="profile-name">Developer</p>
                </div>
                <div class="profile" data-profile="hiring-manager">
                    <div class="profile-avatar" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <i class="fas fa-briefcase"></i>
                    </div>
                    <p class="profile-name">Hiring Manager</p>
                </div>
                <div class="profile" data-profile="stalker">
                    <div class="profile-avatar" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <i class="fas fa-user-secret"></i>
                    </div>
                    <p class="profile-name">Stalker</p>
                </div>
                <div class="profile" data-profile="artist">
                    <div class="profile-avatar" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                        <i class="fas fa-palette"></i>
                    </div>
                    <p class="profile-name">Artist</p>
                </div>
            </div>
            <button class="manage-btn">Manage Profiles</button>
        </div>
    </section>

    <script src="script.js?v=8"></script>
</body>
</html>
